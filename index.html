<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Life & Career Manager — 오늘의 기록</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='32' cy='40' rx='14' ry='19' fill='%237FCBAA'/%3E%3Ccircle cx='20' cy='14' r='6' fill='%237FCBAA'/%3E%3Ccircle cx='32' cy='9' r='6.5' fill='%237FCBAA'/%3E%3Ccircle cx='44' cy='14' r='6' fill='%237FCBAA'/%3E%3Ccircle cx='49' cy='24' r='5' fill='%237FCBAA'/%3E%3C/svg%3E">
<style>
  :root {
    --paper: #F2F8F5;
    --ink: #1E2A3A;
    --ink-soft: #55627A;
    --rule: #D3E8DE;
    --jade: #A9E2C6;
    --jade-mid: #5FAE8D;
    --jade-text: #2F6B54;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Georgia', 'Nanum Myeongjo', serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  header .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  header h1 {
    font-size: 26px;
    margin: 4px 0 0;
    font-weight: 700;
  }
  header .date-today {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 6px;
  }
  header .my-goal {
    margin-top: 14px;
    padding: 14px 4px;
    border-top: 2px solid var(--jade-mid);
    border-bottom: 2px solid var(--jade-mid);
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.7;
    text-align: center;
  }
  header .my-goal .line2 {
    display: block;
    margin-top: 4px;
    color: var(--jade-text);
  }
  nav.tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    overflow: hidden;
  }
  nav.tabs button {
    flex: 1;
    padding: 10px 6px;
    background: transparent;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    cursor: pointer;
    border-right: 1px solid var(--rule);
  }
  nav.tabs button:last-child { border-right: none; }
  nav.tabs button.active {
    background: var(--jade-mid);
    color: #fff;
  }
  section.panel { display: none; }
  section.panel.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input[type="text"],
  .field input[type="date"],
  .field input[type="number"],
  .field input[type="url"],
  .field textarea,
  .field select {
    width: 100%;
    padding: 10px 10px;
    background: #FFFFFF;
    border: 1px solid var(--rule);
    border-bottom: 2px solid var(--jade-mid);
    border-radius: 4px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
  }
  .field textarea { resize: vertical; min-height: 60px; }

  .toggle-row { display: flex; gap: 10px; }
  .toggle {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    border: 1px solid var(--rule);
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    color: var(--ink-soft);
  }
  .toggle.selected.o { background: var(--jade-mid); border-color: var(--jade-mid); color: #fff; }
  .toggle.selected.x { background: #A85A46; border-color: #A85A46; color: #fff; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 12px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-soft);
  }
  .chip.selected { background: var(--jade-mid); border-color: var(--jade-mid); color: #fff; }

  button.submit {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: var(--jade-mid);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  button.submit:active { background: var(--jade-text); }
  button.submit:disabled { opacity: 0.5; }

  .status {
    margin-top: 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    text-align: center;
    min-height: 18px;
  }
  .status.ok { color: var(--jade-text); }
  .status.err { color: #A85A46; }

  /* 성공 모달 */
  .celebrate-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 42, 58, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
  }
  .celebrate-overlay.show { display: flex; animation: overlayFade .2s ease; }
  @keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }
  .celebrate-card {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 28px 24px 22px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 28px rgba(0,0,0,0.18);
  }
  .celebrate-title {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--jade-text);
    margin: 0 0 10px;
  }
  .celebrate-msg {
    font-size: 16px;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .celebrate-mission {
    padding: 12px 14px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    font-family: 'Courier New', monospace;
  }
  .celebrate-close {
    margin-top: 16px;
    width: 100%;
    padding: 11px;
    background: var(--jade-mid);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">AI Life &amp; Career Manager</div>
    <h1>오늘의 기록</h1>
    <div class="date-today" id="todayLabel"></div>
    <div class="my-goal">
      나는 자유롭고, 유능하고, 깊이 사고하는 사람이 될 것이다.
      <span class="line2">하고자 한다면 즉시 실행할 수 있는 사람이 될 것이다.</span>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="daily" class="active">Daily</button>
    <button data-tab="global">해외준비</button>
    <button data-tab="reading">독서/글쓰기</button>
    <button data-tab="application">지원 추가</button>
  </nav>

  <!-- Daily -->
  <section class="panel active" id="panel-daily">
    <div class="field">
      <label>날짜</label>
      <input type="date" id="daily-date" />
    </div>
    <div class="field">
      <label>Deep Thinking 실행</label>
      <div class="toggle-row" id="daily-dt-toggle">
        <div class="toggle o" data-val="O">O</div>
        <div class="toggle x" data-val="X">X</div>
      </div>
    </div>
    <div class="field">
      <label>Deep Thinking 주제</label>
      <input type="text" id="daily-dt-topic" placeholder="예: 브랜드 전략" />
    </div>
    <div class="field">
      <label>운동</label>
      <div class="toggle-row" id="daily-ex-toggle">
        <div class="toggle o" data-val="O">O</div>
        <div class="toggle x" data-val="X">X</div>
      </div>
    </div>
    <div class="field">
      <label>컨디션 메모</label>
      <input type="text" id="daily-condition" placeholder="예: 수면 부족, 피로함" />
    </div>
    <div class="field">
      <label>오늘의 한줄 메모</label>
      <textarea id="daily-note" placeholder="오늘 미래의 나를 위해 한 행동 한 가지"></textarea>
    </div>
    <button class="submit" data-type="daily">기록하기</button>
    <div class="status" id="status-daily"></div>
  </section>

  <!-- Global -->
  <section class="panel" id="panel-global">
    <div class="field">
      <label>날짜</label>
      <input type="date" id="global-date" />
    </div>
    <div class="field">
      <label>항목</label>
      <select id="global-category">
        <option>워홀</option>
        <option>해외채용</option>
        <option>비자</option>
        <option>국가조사</option>
        <option>해외이력서</option>
        <option>영어인터뷰</option>
      </select>
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="global-content" placeholder="무엇을 조사/준비했는지"></textarea>
    </div>
    <div class="field">
      <label>진행상태</label>
      <input type="text" id="global-status" placeholder="예: 조사 중, 서류 준비, 완료" />
    </div>
    <button class="submit" data-type="global">기록하기</button>
    <div class="status" id="status-global"></div>
  </section>

  <!-- Reading -->
  <section class="panel" id="panel-reading">
    <div class="field">
      <label>제목/주제</label>
      <input type="text" id="reading-title" placeholder="책 제목 또는 글 제목" />
    </div>
    <div class="field">
      <label>유형</label>
      <div class="chips" id="reading-type-chips">
        <div class="chip" data-val="독서">독서</div>
        <div class="chip" data-val="논술">논술</div>
        <div class="chip" data-val="전략문서">전략문서</div>
        <div class="chip" data-val="에세이">에세이</div>
        <div class="chip" data-val="브랜드분석">브랜드분석</div>
        <div class="chip" data-val="사업기획">사업기획</div>
        <div class="chip" data-val="칼럼">칼럼</div>
      </div>
    </div>
    <div class="field">
      <label>날짜</label>
      <input type="date" id="reading-date" />
    </div>
    <div class="field">
      <label>요약</label>
      <textarea id="reading-summary"></textarea>
    </div>
    <div class="field">
      <label>비판/내의견</label>
      <textarea id="reading-critique"></textarea>
    </div>
    <div class="field">
      <label>소요시간(분, 선택)</label>
      <input type="number" id="reading-duration" />
    </div>
    <button class="submit" data-type="reading">기록하기</button>
    <div class="status" id="status-reading"></div>
  </section>

  <!-- Application -->
  <section class="panel" id="panel-application">
    <div class="field">
      <label>공고명</label>
      <input type="text" id="app-title" placeholder="예: 카카오 마케팅 신입" />
    </div>
    <div class="field">
      <label>상태</label>
      <select id="app-status">
        <option>발표 전</option>
        <option>서류합격</option>
        <option>서류탈락</option>
        <option>인적성 합격</option>
        <option>인적성탈락</option>
        <option>면접합격</option>
        <option>면접탈락</option>
        <option>최종합격</option>
      </select>
    </div>
    <div class="field">
      <label>공고링크</label>
      <input type="url" id="app-link" placeholder="https://..." />
    </div>
    <div class="field">
      <label>직무 (복수 선택 가능)</label>
      <div class="chips" id="app-job-chips">
        <div class="chip" data-val="마케팅">마케팅</div>
        <div class="chip" data-val="사무직">사무직</div>
        <div class="chip" data-val="공간지원">공간지원</div>
        <div class="chip" data-val="상품기획">상품기획</div>
        <div class="chip" data-val="아르바이트">아르바이트</div>
        <div class="chip" data-val="대외활동">대외활동</div>
        <div class="chip" data-val="해외영업">해외영업</div>
        <div class="chip" data-val="해외마케팅">해외마케팅</div>
        <div class="chip" data-val="PR">PR</div>
        <div class="chip" data-val="번역/통역">번역/통역</div>
        <div class="chip" data-val="부수입">부수입</div>
      </div>
    </div>
    <div class="field">
      <label>지원 날짜</label>
      <input type="date" id="app-date" />
    </div>
    <div class="field">
      <label>특이사항</label>
      <textarea id="app-note"></textarea>
    </div>
    <button class="submit" data-type="application">기록하기</button>
    <div class="status" id="status-application"></div>
  </section>


</div>

<!-- 기록 완료 축하 모달 -->
<div class="celebrate-overlay" id="celebrateOverlay">
  <div class="celebrate-card">
    <div class="celebrate-title">RECORD SAVED</div>
    <div class="celebrate-msg" id="celebrateMsg">기록이 저장됐어요.</div>
    <div class="celebrate-mission">
      자유롭고, 유능하고, 깊이 사고하는 사람 —<br>그 목표에 오늘도 한 걸음 더 가까워졌습니다.
    </div>
    <button class="celebrate-close" id="celebrateClose">계속하기</button>
  </div>
</div>

<script>
  // ▼▼▼ Apps Script 배포 후 이 URL을 교체하세요 ▼▼▼
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn9Sb5Cjd-t-tz0JBhkW3H8btpjnKwpOQo9z5vage3MasftQxdyDUFvXK1I8Os4vskBw/exec";
  // ▲▲▲ ------------------------------------- ▲▲▲

  const CELEBRATE_CONTENT = {
    daily: '오늘의 사고력과 건강을 챙겼어요.',
    global: '해외로 가는 문에 한 걸음 더 가까워졌어요.',
    reading: '생각이 한 뼘 더 자라났어요.',
    application: '자유를 향한 지원서, 하나 더 쌓였어요.',
  };

  // 새벽 2시 이전은 "전날"로 카운트하는 기준일 계산 (로컬 시간 기준)
  function getEffectiveDateStr() {
    const now = new Date();
    const effective = new Date(now.getTime());
    if (now.getHours() < 2) {
      effective.setDate(effective.getDate() - 1);
    }
    const y = effective.getFullYear();
    const m = String(effective.getMonth() + 1).padStart(2, '0');
    const d = String(effective.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  const todayStr = getEffectiveDateStr();
  const isPastMidnightBeforeCutoff = new Date().getHours() < 2;

  document.getElementById('todayLabel').textContent =
    new Date(todayStr + 'T12:00:00').toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    }) + (isPastMidnightBeforeCutoff ? ' (새벽 2시 이전 · 전날로 기록)' : '');

  ['daily-date', 'global-date', 'reading-date', 'app-date'].forEach(id => {
    document.getElementById(id).value = todayStr;
  });

  document.querySelectorAll('nav.tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('section.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  function setupToggle(containerId) {
    const container = document.getElementById(containerId);
    container.querySelectorAll('.toggle').forEach(t => {
      t.addEventListener('click', () => {
        container.querySelectorAll('.toggle').forEach(x => x.classList.remove('selected'));
        t.classList.add('selected');
      });
    });
  }
  setupToggle('daily-dt-toggle');
  setupToggle('daily-ex-toggle');

  function getToggleVal(containerId) {
    const sel = document.querySelector('#' + containerId + ' .toggle.selected');
    return sel ? sel.dataset.val : 'X';
  }

  document.querySelectorAll('#reading-type-chips .chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('#reading-type-chips .chip').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
    });
  });

  document.querySelectorAll('#app-job-chips .chip').forEach(c => {
    c.addEventListener('click', () => c.classList.toggle('selected'));
  });

  function collectPayload(type) {
    if (type === 'daily') {
      return {
        type: 'daily',
        date: document.getElementById('daily-date').value,
        deepThinkingDone: getToggleVal('daily-dt-toggle'),
        deepThinkingTopic: document.getElementById('daily-dt-topic').value,
        exercise: getToggleVal('daily-ex-toggle'),
        condition: document.getElementById('daily-condition').value,
        note: document.getElementById('daily-note').value,
      };
    }
    if (type === 'global') {
      return {
        type: 'global',
        date: document.getElementById('global-date').value,
        category: document.getElementById('global-category').value,
        content: document.getElementById('global-content').value,
        status: document.getElementById('global-status').value,
      };
    }
    if (type === 'reading') {
      const typeChip = document.querySelector('#reading-type-chips .chip.selected');
      return {
        type: 'reading',
        title: document.getElementById('reading-title').value,
        category: typeChip ? typeChip.dataset.val : '독서',
        date: document.getElementById('reading-date').value,
        summary: document.getElementById('reading-summary').value,
        critique: document.getElementById('reading-critique').value,
        duration: document.getElementById('reading-duration').value,
      };
    }
    if (type === 'application') {
      const jobChips = Array.from(document.querySelectorAll('#app-job-chips .chip.selected')).map(c => c.dataset.val);
      return {
        type: 'application',
        companyRole: document.getElementById('app-title').value,
        status: document.getElementById('app-status').value,
        link: document.getElementById('app-link').value,
        jobTypes: jobChips,
        date: document.getElementById('app-date').value,
        note: document.getElementById('app-note').value,
      };
    }
  }

  function showCelebration(type) {
    document.getElementById('celebrateMsg').textContent = CELEBRATE_CONTENT[type] || '기록이 저장됐어요.';
    document.getElementById('celebrateOverlay').classList.add('show');
  }
  document.getElementById('celebrateClose').addEventListener('click', () => {
    document.getElementById('celebrateOverlay').classList.remove('show');
  });
  document.getElementById('celebrateOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'celebrateOverlay') {
      document.getElementById('celebrateOverlay').classList.remove('show');
    }
  });

  document.querySelectorAll('button.submit').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.dataset.type;
      const statusEl = document.getElementById('status-' + type);
      const payload = collectPayload(type);

      if (APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
        statusEl.textContent = '⚠ APPS_SCRIPT_URL이 아직 설정되지 않았어요.';
        statusEl.className = 'status err';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = '기록하는 중...';
      statusEl.className = 'status';

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.ok) {
          statusEl.textContent = '✓ 기록 완료';
          statusEl.className = 'status ok';
          showCelebration(type);
        } else {
          statusEl.textContent = '✗ 실패: ' + data.error;
          statusEl.className = 'status err';
        }
      } catch (err) {
        statusEl.textContent = '✗ 네트워크 오류: ' + err.message;
        statusEl.className = 'status err';
      } finally {
        btn.disabled = false;
      }
    });
  });
</script>
</body>
</html>
